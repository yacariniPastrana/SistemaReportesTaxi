<div class="login-wrapper">
  <div class="login-card">
    <h2>Sistema Taxis</h2>
    <p>Ingrese sus credenciales</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      
      <div class="form-group">
        <label for="username">Usuario</label>
        <input type="text" id="username" formControlName="username" placeholder="Ej: admin">
        <div *ngIf="username?.invalid && (username?.dirty || username?.touched)" class="error-msg">
          <small *ngIf="username?.errors?.['required']">El usuario es requerido.</small>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" formControlName="password" placeholder="******">
        <div *ngIf="password?.invalid && (password?.dirty || password?.touched)" class="error-msg">
          <small *ngIf="password?.errors?.['required']">La contraseña es requerida.</small>
        </div>
      </div>

      <p *ngIf="errorMessage" class="alert-danger">{{errorMessage}}</p>

      <button type="submit" [disabled]="!loginForm.valid">INGRESAR</button>
    </form>
  </div>
</div>
