<div class="login-wrapper">
  <div class="login-card">
    <h2>Sistema Taxis</h2>
    <p>Ingrese sus credenciales</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      
      <div class="form-group">
        <label for="correo">Correo Electrónico</label>
        <input type="email" id="correo" formControlName="correo" placeholder="ejemplo@taxi.com">
        
        <div *ngIf="correo?.invalid && (correo?.dirty || correo?.touched)" class="error-msg">
          <small *ngIf="correo?.errors?.['required']">El correo es obligatorio.</small>
          <small *ngIf="correo?.errors?.['email']">Ingrese un formato de correo válido.</small>
        </div>
      </div>

      <div class="form-group">
        <label for="contrasena">Contraseña</label>
        <input type="password" id="contrasena" formControlName="contrasena" placeholder="******">
        
        <div *ngIf="contrasena?.invalid && (contrasena?.dirty || contrasena?.touched)" class="error-msg">
          <small *ngIf="contrasena?.errors?.['required']">La contraseña es obligatoria.</small>
        </div>
      </div>

      <p *ngIf="errorMessage" class="alert-danger">{{errorMessage}}</p>

      <button type="submit" [disabled]="!loginForm.valid" class="btn-primary">INGRESAR</button>
      
      <div class="register-section" style="margin-top: 15px; text-align: center; border-top: 1px solid #ccc; padding-top: 15px;">
        <p style="font-size: 0.9em; margin-bottom: 10px;">¿No tienes una cuenta?</p>
        <button type="button" (click)="irARegistro()" class="btn-secondary" style="background-color: #f8f9fa; color: #333; border: 1px solid #ccc;">Registrar Nuevo Usuario</button>
      </div>

    </form>
  </div>
</div>
